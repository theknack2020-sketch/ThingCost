included:
  - Sources
  - Tests
  - UITests

disabled_rules:
  - line_length
  - trailing_whitespace
  - opening_brace

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicit_return
  - modifier_order
  - overridden_super_call
  - private_over_fileprivate
  - sorted_imports
  - vertical_whitespace_closing_braces

force_cast: warning
force_try: warning
identifier_name:
  min_length: 2
  max_length: 60
type_body_length: 500
file_length:
  warning: 800
  error: 1000
function_body_length:
  warning: 100
  error: 150
