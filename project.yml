name: ThingCost
options:
  bundleIdPrefix: com.ufukozdemir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - Base

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 99H9NJ6Z6J
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "5"

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

targets:
  ThingCost:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: TelemetryDeck
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ThingCost
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ufukozdemir.thingcost

  ThingCostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ThingCost

  ThingCostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ThingCost

schemes:
  ThingCost:
    build:
      targets:
        ThingCost: all
        ThingCostTests: [test]
        ThingCostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Store.storekit
    test:
      targets:
        - ThingCostTests
        - ThingCostUITests
