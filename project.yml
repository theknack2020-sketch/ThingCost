name: ThingCost
options:
  bundleIdPrefix: com.ufukozdemir
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 99H9NJ6Z6J
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ThingCost:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: ThingCost
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ufukozdemir.thingcost
    dependencies:
      - target: ThingCostWidgetExtension

  ThingCostWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Sources/Models
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: ThingCost Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ufukozdemir.thingcost.widget

  ThingCostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ThingCost

  ThingCostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ThingCost

schemes:
  ThingCost:
    build:
      targets:
        ThingCost: all
        ThingCostWidgetExtension: all
        ThingCostTests: [test]
        ThingCostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Store.storekit
    test:
      targets:
        - ThingCostTests
        - ThingCostUITests
